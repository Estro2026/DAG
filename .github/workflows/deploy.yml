name: Deploy DAG Wireframe

on:
  push:
    branches: [main, ecommerce, mockup]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout vetrina (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout ecommerce
        uses: actions/checkout@v4
        with:
          ref: ecommerce
          path: site/ecommerce

      - name: Checkout mockup
        uses: actions/checkout@v4
        with:
          ref: mockup
          path: site/mockup

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
